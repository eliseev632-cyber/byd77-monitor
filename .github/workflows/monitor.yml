name: BYD77 Monitor

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # ВАЖНО: Разрешаем боту сохранять файлы

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run monitor script
        run: python monitor.py

      - name: Commit updated state
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if [ -f seen_txs.json ]; then
            git add seen_txs.json
            git commit -m "Update seen transactions state" || echo "No changes to commit"
            git push
          else
            echo "Файл состояния еще не создан, пропускаем сохранение"
          fi
